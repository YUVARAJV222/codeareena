# ===================================================================
# CodeArena - Default profile: MySQL database
# Requires a local/remote MySQL server. Update credentials via env
# vars or by editing the values below before running.
# For a zero-setup demo without MySQL, run with:
#   --spring.profiles.active=h2
# ===================================================================

spring.application.name=codearena

# MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/codearena?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Brindhasp@16
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Seed sample problems on startup
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=9f4d7b2c8a1e5f0d3c6b9a8e7f2d1c5a8b4e6f9d2c7a1b3e5f8d9c6a2b7e4f1
jwt.expiration=86400000

server.port=8081

# ===================================================================
# Google Sign-In
